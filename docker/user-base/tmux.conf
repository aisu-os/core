# Aisu default tmux konfiguratsiya

# Sichqoncha qo'llab-quvvatlash (scroll, oyna tanlash, panel resize)
set -g mouse on

# 256 rang rejimi
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Scrollback buffer hajmi
set -g history-limit 10000

# Escape delay ni kamaytirish (vim uchun)
set -sg escape-time 10
